<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2B45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <g opacity="0.1" filter="url(#blur)">
    <!-- Mountain silhouettes -->
    <path d="M0 500 L200 350 L400 450 L600 300 L800 400 L1000 350 L1200 450 L1200 700 L0 700 Z" fill="#FFFFFF"/>
    
    <!-- Stylized clouds -->
    <circle cx="200" cy="150" r="40" fill="#FFFFFF"/>
    <circle cx="250" cy="160" r="50" fill="#FFFFFF"/>
    <circle cx="300" cy="140" r="35" fill="#FFFFFF"/>
    
    <circle cx="800" cy="100" r="30" fill="#FFFFFF"/>
    <circle cx="850" cy="110" r="40" fill="#FFFFFF"/>
    <circle cx="900" cy="90" r="25" fill="#FFFFFF"/>
  </g>
  
  <!-- Subtle grid pattern -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    
    <line x1="0" y1="0" x2="0" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
    <line x1="1000" y1="0" x2="1000" y2="700"/>
    <line x1="1200" y1="0" x2="1200" y2="700"/>
  </g>
  
  <!-- Logo text -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.2">SkyLine Webcams</text>
</svg>